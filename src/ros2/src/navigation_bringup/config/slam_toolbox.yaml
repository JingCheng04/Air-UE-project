slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_frame: map
    odom_frame: UAV_1/odom_local
    base_frame: UAV_1
    scan_topic: /uav/scan
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    debug_logging: false
