<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" font-family="Times New Roman, SimSun, serif">
  <rect width="420" height="520" fill="#ffffff"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Layer 1: 控制系统 -->
  <rect x="60" y="20" width="340" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="230" y="47" text-anchor="middle" font-size="16" fill="#000">控制系统</text>

  <!-- Arrow -->
  <path d="M230,62 L230,82" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: ROS2 -->
  <rect x="60" y="88" width="340" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="230" y="115" text-anchor="middle" font-size="16" fill="#000">ROS2</text>

  <!-- Arrow split to two -->
  <path d="M140,130 L140,150" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ROS2 to 无人车: single straight arrow -->
  <path d="M320,130 L320,218" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: PX4 (UAV only) -->
  <rect x="60" y="156" width="160" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="140" y="183" text-anchor="middle" font-size="16" fill="#000">PX4飞控</text>

  <!-- Arrow from PX4 down -->
  <path d="M140,198 L140,218" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Layer 4: UAV and UGV side by side -->
  <rect x="60" y="224" width="160" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="140" y="251" text-anchor="middle" font-size="16" fill="#000">无人机</text>

  <rect x="240" y="224" width="160" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="320" y="251" text-anchor="middle" font-size="16" fill="#000">无人车</text>

  <!-- Arrows down converge -->
  <path d="M140,266 L140,286" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M320,266 L320,286" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: 软件兼容层 -->
  <rect x="60" y="292" width="340" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="230" y="319" text-anchor="middle" font-size="16" fill="#000">软件兼容层</text>

  <!-- Arrow -->
  <path d="M230,334 L230,354" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Layer 6: 仿真框架 -->
  <rect x="60" y="360" width="340" height="42" rx="4" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="230" y="387" text-anchor="middle" font-size="16" fill="#000">Cosys-AirSim</text>

</svg>